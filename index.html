<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Rakétás Télapó</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: Georgia, serif;
  color: white;
}

* {
  box-sizing: border-box;
}

.scene {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  background: black;
}

/* háttér + hangulat videók */

#mainBg,
#walkVideo,
#snowMoodVideo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 35% center;
}

#mainBg {
  z-index: 1;
}

#walkVideo {
  z-index: 2;
  display: none;
}

#snowMoodVideo {
  z-index: 3;
  display: none;
  mix-blend-mode: screen;
}

/* vers overlay + videó */

#poemOverlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  background: rgba(0,0,0,0.88);
}

#poemVideo {
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: black;
  box-shadow: 0 0 40px rgba(255,255,255,0.25);
}

/* gombok */

.controls {
  position: absolute;
  left: 50%;
  bottom: 5vh;
  transform: translateX(-50%);
  display: flex;
  gap: 30px;
  z-index: 999;
  align-items: flex-end;
}

.btnBlock {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.btnLabel {
  font-size: 18px;
  letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

.img-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

.img-btn img {
  width: 120px;
  display: block;
  height: auto;
}

#moodBtn img {
  width: 100px;
  filter: drop-shadow(0 0 12px rgba(200,220,255,0.5));
}

/* vissza gomb */

#closeBtn {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 2100;
  padding: 10px 18px;
  background: rgba(0,0,0,0.55);
  color: white;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.4);
  cursor: pointer;
  backdrop-filter: blur(4px);
  display: none;
  font-size: 15px;
}

/* MOBIL */
@media (max-width: 700px) {

  .scene {
    height: 100dvh;
  }

  #mainBg,
  #walkVideo,
  #snowMoodVideo {
    object-position: 20% center;
  }

 .controls {
  position: absolute;
  right: 12px;
  top: 38%;
  transform: translateY(-50%);

  display: flex;
  flex-direction: column;
  gap: 18px;

  align-items: center;

  animation: floatBtns 5s ease-in-out infinite;
}

  .controls .btnBlock {
    width: 100%;
  }

  .img-btn img {
    width: 80px;
  }

  #moodBtn img {
    width: 70px;
  }

  .btnLabel {
    font-size: 14px;
    text-align: center;
  }

  #poemVideo {
    width: 92vw;
    height: auto;
    max-height: 70vh;
    object-fit: contain;
  }

  #closeBtn {
    top: max(14px, env(safe-area-inset-top));
    right: max(14px, env(safe-area-inset-right));
    font-size: 14px;
    padding: 9px 15px;
  }
}

@keyframes floatBtns {
  0% {
    transform: translateY(-50%) translateY(0px);
  }

  50% {
    transform: translateY(-50%) translateY(-6px);
  }

  100% {
    transform: translateY(-50%) translateY(0px);
  }
}
</style>
</head>

<body>

<div class="scene">

  <img id="mainBg" src="hatter1.png" alt="Háttér">

  <video id="walkVideo" src="elsetal.mp4" playsinline preload="auto"></video>

  <video id="snowMoodVideo" src="hanghoeses.mp4" loop playsinline preload="auto"></video>

  <button id="closeBtn">Vissza</button>

  <div class="controls">

    <div class="btnBlock">
      <div class="btnLabel">Hangulat</div>
      <button class="img-btn" id="moodBtn">
        <img src="hangulatgomb.png" alt="Hangulat">
      </button>
    </div>

    <div class="btnBlock">
      <div class="btnLabel">AT1</div>
      <button class="img-btn" id="poem1Btn">
        <img src="gomb1.png" alt="AT1">
      </button>
    </div>

    <div class="btnBlock">
      <div class="btnLabel">AT2</div>
      <button class="img-btn" id="poem2Btn">
        <img src="gomb2.png" alt="AT2">
      </button>
    </div>

    <div class="btnBlock">
      <div class="btnLabel">AT3</div>
      <button class="img-btn" id="rocketBtn">
        <img src="gomb3.png" alt="AT3">
      </button>
    </div>

  </div>

</div>

<div id="poemOverlay">
  <video id="poemVideo" controls playsinline></video>
</div>

<script>
const walkVideo = document.getElementById("walkVideo");
const snowVideo = document.getElementById("snowMoodVideo");
const poemVideo = document.getElementById("poemVideo");
const poemOverlay = document.getElementById("poemOverlay");

const moodBtn = document.getElementById("moodBtn");
const poem1Btn = document.getElementById("poem1Btn");
const poem2Btn = document.getElementById("poem2Btn");
const rocketBtn = document.getElementById("rocketBtn");

const controls = document.querySelector(".controls");
const closeBtn = document.getElementById("closeBtn");

const poem1Url = "https://res.cloudinary.com/dgcumjeuj/video/upload/VERS1_mxdwsj.mp4";
const poem2Url = "https://res.cloudinary.com/dgcumjeuj/video/upload/VERS2_pklbnl.mp4";
const at3Url = "https://trknorbert76-eng.github.io/raketastelapo2/";

let moodActive = false;

function stopMood() {
  moodActive = false;

  walkVideo.pause();
  snowVideo.pause();

  walkVideo.currentTime = 0;
  snowVideo.currentTime = 0;

  walkVideo.style.display = "none";
  snowVideo.style.display = "none";
}

function stopPoem() {
  poemVideo.pause();
  poemVideo.currentTime = 0;
  poemVideo.removeAttribute("src");
  poemVideo.load();
  poemOverlay.style.display = "none";
  closeBtn.style.display = "none";
  controls.style.display = "";
}

function startPoem(url) {
  stopMood();

  controls.style.display = "none";
  poemVideo.src = url;
  poemOverlay.style.display = "flex";
  closeBtn.style.display = "block";

  poemVideo.play().catch(() => {});
}

moodBtn.onclick = async () => {
  if (!moodActive) {
    moodActive = true;

    walkVideo.style.display = "block";
    snowVideo.style.display = "block";

    snowVideo.volume = 0.5;

    try {
      await walkVideo.play();
    } catch (e) {}

    try {
      await snowVideo.play();
    } catch (e) {}
  } else {
    stopMood();
  }
};

poem1Btn.onclick = () => {
  startPoem(poem1Url);
};

poem2Btn.onclick = () => {
  startPoem(poem2Url);
};

closeBtn.onclick = () => {
  stopPoem();
};

rocketBtn.onclick = () => {
  window.location.href = at3Url;
};
</script>

</body>
</html>
